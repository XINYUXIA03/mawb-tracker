<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAWB Cargo Tracker</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --ok: #4ade80;
    --err: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .card {
    width: min(560px, 92vw);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
  }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 24px; }
  .row { display: flex; gap: 10px; }
  input[type=text] {
    flex: 1;
    font-size: 18px;
    font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
    letter-spacing: 1px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  button.primary {
    padding: 12px 22px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #04212e;
    cursor: pointer;
  }
  button.primary:hover { filter: brightness(1.1); }
  .result {
    margin-top: 20px;
    padding: 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 15px;
    line-height: 1.6;
    display: none;
  }
  .result.show { display: block; }
  .result.error { border-color: var(--err); color: var(--err); }
  .result .airline { font-size: 18px; font-weight: 700; color: var(--text); }
  .result .meta { color: var(--muted); font-size: 13px; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    margin-left: 8px;
    vertical-align: middle;
  }
  .badge.ok { background: rgba(74,222,128,.15); color: var(--ok); }
  .badge.warn { background: rgba(248,113,113,.15); color: var(--err); }
  .actions { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
  .actions a, .actions button.alt {
    display: inline-block;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: none;
  }
  .btn-main { background: var(--accent); color: #04212e; }
  .btn-sec { background: transparent; color: var(--accent); border: 1px solid var(--accent) !important; }
  .hint { margin-top: 8px; font-size: 12px; color: var(--muted); }
  .recent { margin-top: 24px; }
  .recent h2 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 8px; }
  .recent button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    padding: 6px 12px;
    margin: 0 6px 6px 0;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="card">
  <h1>✈️ MAWB Cargo Tracker</h1>
  <p class="sub">Enter a Master Air Waybill number, e.g. <code>001-12345675</code>. Tracking opens automatically in a new tab.</p>
  <div class="row">
    <input id="awb" type="text" placeholder="001-12345678" autofocus
           autocomplete="off" spellcheck="false">
    <button id="go" class="primary">Track</button>
  </div>
  <div id="result" class="result"></div>
  <div class="recent" id="recent"></div>
</div>

const $awb = document.getElementById("awb");
const $result = document.getElementById("result");
const $recent = document.getElementById("recent");

function parseAWB(raw) {
  const digits = raw.replace(/\D/g, "");
  if (digits.length !== 11) {
    return { error: "A MAWB has 11 digits (3-digit airline prefix + 8-digit number). Got " + digits.length + "." };
  }
  const prefix = digits.slice(0, 3);
  const serial8 = digits.slice(3);          // 7-digit serial + 1 check digit
  const serial7 = parseInt(serial8.slice(0, 7), 10);
  const checkDigit = parseInt(serial8.slice(7), 10);
  const checkOK = serial7 % 7 === checkDigit;
  return { prefix, serial: serial8, awb: prefix + "-" + serial8, checkOK };
}

function buildURL(template, p) {
  return template
    .replaceAll("{prefix}", p.prefix)
    .replaceAll("{serial}", p.serial)
    .replaceAll("{awb}", p.awb);
}

// Auto-search on track-trace.com: submit their tracking form (POST) in a new
// tab. Works for every airline track-trace supports, no pasting needed.
function openTrackTrace(awb) {
  const f = document.createElement("form");
  f.method = "POST";
  f.action = "https://www.track-trace.com/aircargo";
  f.target = "_blank";
  [["number", awb], ["config", "206300"], ["commit", "Track with options"]].forEach(([n, v]) => {
    const i = document.createElement("input");
    i.type = "hidden"; i.name = n; i.value = v;
    f.appendChild(i);
  });
  document.body.appendChild(f);
  f.submit();
  f.remove();
}

function track() {
  const p = parseAWB($awb.value);
  $result.className = "result show";

  if (p.error) {
    $result.classList.add("error");
    $result.textContent = "⚠ " + p.error;
    return;
  }

  const a = AIRLINES[p.prefix];
  const name = a ? a[0] : "Unknown airline";
  const iata = a ? a[1] : "prefix " + p.prefix;
  const official = a && a[2] ? buildURL(a[2], p) : "";
  const isDeepLink = a && a[2] && a[2].includes("{");

  const checkBadge = p.checkOK
    ? '<span class="badge ok">check digit ✓</span>'
    : '<span class="badge warn">check digit ✗ — possible typo</span>';

  // Auto-open the search (user click = popup allowed):
  // official deep link if we have one, otherwise track-trace auto-search.
  if (isDeepLink) {
    window.open(official, "_blank");
  } else {
    openTrackTrace(p.awb);
  }

  let actions = "";
  if (isDeepLink) {
    actions =
      '<a class="btn-main" href="' + official + '" target="_blank">Official site search ↗</a>' +
      '<button class="alt btn-sec" onclick="openTrackTrace(\'' + p.awb + '\')">track-trace search</button>';
  } else {
    actions =
      '<button class="alt btn-main" onclick="openTrackTrace(\'' + p.awb + '\')">track-trace search ↗</button>' +
      (official ? '<a class="btn-sec" href="' + official + '" target="_blank">Official site (paste AWB)</a>' : "");
  }

  $result.innerHTML =
    '<div class="airline">' + name + " (" + iata + ")" + checkBadge + "</div>" +
    '<div class="meta">' + p.awb + "</div>" +
    '<div class="actions">' + actions + "</div>" +
    '<div class="hint">Search opened in a new tab automatically. AWB copied to clipboard.' +
    (a ? "" : " Prefix not in database — using track-trace universal search.") + "</div>";

  navigator.clipboard && navigator.clipboard.writeText(p.awb).catch(() => {});
  saveRecent(p.awb);
  renderRecent();
}

// --- recent searches (localStorage) ---
function saveRecent(awb) {
  let list = JSON.parse(localStorage.getItem("recentAWBs") || "[]");
  list = [awb, ...list.filter(x => x !== awb)].slice(0, 6);
  localStorage.setItem("recentAWBs", JSON.stringify(list));
}
function renderRecent() {
  const list = JSON.parse(localStorage.getItem("recentAWBs") || "[]");
  $recent.innerHTML = list.length
    ? "<h2>Recent</h2>" + list.map(a => '<button data-awb="' + a + '">' + a + "</button>").join("")
    : "";
}
$recent.addEventListener("click", e => {
  if (e.target.dataset.awb) { $awb.value = e.target.dataset.awb; track(); }
});

// auto-format as XXX-XXXXXXXX while typing
$awb.addEventListener("input", () => {
  const d = $awb.value.replace(/\D/g, "").slice(0, 11);
  $awb.value = d.length > 3 ? d.slice(0, 3) + "-" + d.slice(3) : d;
});

document.getElementById("go").addEventListener("click", track);
$awb.addEventListener("keydown", e => { if (e.key === "Enter") track(); });
renderRecent();
</script>
</body>
</html>
